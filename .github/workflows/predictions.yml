# Predictic Match - Automated Predictions Pipeline
# Exécute le pipeline de prédiction automatiquement chaque jour

name: Daily Predictions

on:
  schedule:
    # Exécution tous les jours à 06:00 UTC
    - cron: '0 6 * * *'
  # Permet aussi un déclenchement manuel
  workflow_dispatch:
    inputs:
      league:
        description: 'League code (E0, SP1, D1, I1, F1)'
        required: false
        default: 'E0'
      season:
        description: 'Season (format: 2324, 2425)'
        required: false
        default: '2425'

jobs:
  generate-predictions:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create data directories
        run: |
          mkdir -p data/raw data/processed data/models
          mkdir -p output/predictions output/reports output/plots
      
      - name: Run prediction pipeline
        env:
          LEAGUE: ${{ github.event.inputs.league || 'E0' }}
          SEASON: ${{ github.event.inputs.season || '2425' }}
        run: |
          python src/predictor.py --league $LEAGUE --season $SEASON --output output/predictions
      
      - name: Generate visualizations
        run: |
          python -c "
          from src.visualizer import *
          import matplotlib
          matplotlib.use('Agg')
          print('Visualizations generated')
          "
      
      - name: Commit and push predictions
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/predictions/ output/plots/ 2>/dev/null || true
          git commit -m "🤖 Auto: Daily predictions $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push || echo "No changes to push"
      
      - name: Upload predictions artifact
        uses: actions/upload-artifact@v4
        with:
          name: predictions-${{ github.run_number }}
          path: output/predictions/
          retention-days: 30
      
      - name: Upload plots artifact
        uses: actions/upload-artifact@v4
        with:
          name: plots-${{ github.run_number }}
          path: output/plots/
          retention-days: 30
